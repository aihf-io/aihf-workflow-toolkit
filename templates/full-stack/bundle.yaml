name: full-stack-workflow
version: 1

# Full-stack workflow template
# Complete workflow with authentication, database, and multi-step flow
#
# IMPORTANT: Condition variables referenced in workflow.yaml (e.g., "action")
# must be declared as output parameters on at least one API route per step.

steps:
  # Landing / Login page
  - id: "home"
    route: '/'
    domain: 'app'
    ui:
      dynamic: 'ui/home.ts'
    api:
      - route_match: '/login'
        file: 'api/login.ts'
        input:
          - name: 'email'
            type: 'string'
        output:
          - name: 'action'
            type: 'string'
          - name: 'success'
            type: 'boolean'

  # Magic link verification
  - id: "verify"
    route: '/verify'
    domain: 'app'
    api:
      - route_match: '/'
        file: 'api/verify.ts'
        input:
          - name: 'token'
            type: 'string'
        output:
          - name: 'action'
            type: 'string'
          - name: 'verified'
            type: 'boolean'

  # Dashboard (authenticated)
  - id: "dashboard"
    route: '/dashboard'
    domain: 'app'
    ui:
      dynamic: 'ui/dashboard.ts'
    api:
      - route_match: '/data'
        file: 'api/get-data.ts'
        output:
          - name: 'items'
            type: 'string'
      - route_match: '/create'
        file: 'api/create-item.ts'
        input:
          - name: 'title'
            type: 'string'
          - name: 'content'
            type: 'string'
        output:
          - name: 'action'
            type: 'string'
          - name: 'item'
            type: 'string'

  # Terminator step — needed in bundle.yaml even though it has no handlers
  - id: "complete"
    route: '/complete'
    domain: 'app'
    ui:
      dynamic: 'ui/home.ts'
